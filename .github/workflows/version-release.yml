name: Version tag, changelog, and release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Detect version bump, tag, changelog, package, release
        run: python3 scripts/version_release.py HEAD~1 HEAD
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Commit regenerated CHANGELOG.md, if changed
        run: |
          git add '**/CHANGELOG.md' 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: regenerate changelog [skip ci]"
            git push
          fi
